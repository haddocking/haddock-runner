general:
  max_concurrent: 100
  ncores: 1
  execution: slurm
  mol_suffixes: [_r_u, _l_u, _x_u]
  input_list: docking/input_list.txt
  work_dir: ../bm-goes-here

scenarios:
  - name: true-interface
    workflow:
      topoaa:
        autohis: true
      rigidbody:
        sampling: 10
        ambig_fname: _ti.tbl
        unambig_fname: _unambig.tbl
        ligand_top_fname: _ligand.top
        ligand_param_fname: _ligand.param
      seletop:
        select: 2
      flexref:
        ambig_fname: _ti.tbl
        unambig_fname: _unambig.tbl
        ligand_top_fname: _ligand.top
        ligand_param_fname: _ligand.param
      emref:
      caprieval:
        reference_fname: _ref.pdb

  - name: ab-initio
    workflow:
      topoaa:
      rigidbody:
        sampling: 1
        cmrest: true

  #-----------------------------------------------
