general:
  # How many should be executed at the same time
  max_concurrent: 4
  # How many cores should each run take
  ncores: 2
  execution: local
  mol_suffixes: [_r_u, _l_u, _x_u]
  # Paths are relative to the location of this file
  input_list: docking/input_list.txt
  work_dir: ../bm-goes-here

scenarios:
  - name: true-interface
    workflow:
      topoaa:
        autohis: true
      rigidbody:
        sampling: 10
        ambig_fname: _ti.tbl
        unambig_fname: _unambig.tbl
        ligand_top_fname: _ligand.top
        ligand_param_fname: _ligand.param
      seletop:
        select: 2
      flexref:
        ambig_fname: _ti.tbl
        unambig_fname: _unambig.tbl
        ligand_top_fname: _ligand.top
        ligand_param_fname: _ligand.param
      emref:
      caprieval:
        reference_fname: _ref.pdb

  - name: center-of-mass
    workflow:
      topoaa:
        autohis: true
      rigidbody:
        sampling: 5
        cmrest: true

  - name: random-restraints
    workflow:
      topoaa:
        autohis: true
      rigidbody:
        sampling: 5
        ranair: true
